<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Golf</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #cde6a3;
        }

        canvas {
            background: #4caf50;
            display: block;
            margin: 20px auto;
            border: 2px solid #333;
        }

        #scoreboard {
            font-size: 18px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Miniature Golf</h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="scoreboard"></div>
    <button id="nextHoleBtn" disabled>Next Hole</button>
    <div id="messageOverlay" style="
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    display:none;
">
        <div id="messageText"></div>
        <button id="continueBtn" style="margin-top:20px; padding:10px 20px; font-size:18px;">Continue</button>
    </div>
    <script src="course.js"></script>
    <script src="game.js"></script>
</body>

</html>
